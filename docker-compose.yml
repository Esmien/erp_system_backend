version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: business_db
    restart: always
    ports:
      - "5432:5432"
    shm_size: 1gb
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME:-business_management}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    command: postgres -c max_connections=500
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh
    # Проверка здоровья БД
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-business_management}"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

  migration:
    build: .
    container_name: migration
    env_file:
      - .env
    depends_on:
      - db
    # Используем твой entrypoint, чтобы дождаться доступности БД
    entrypoint: [ "/bin/bash", "/app/entrypoint.sh" ]
    command: alembic upgrade head
    volumes:
      - .:/app

  backend:
    build: .
    container_name: backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=db
    depends_on:
      db:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    volumes:
      - .:/app
    command: uvicorn backend.api.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data: