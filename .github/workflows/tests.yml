name: CI Pipeline

on:
  push:
    branches: ["main", "master", "dev"]
  pull_request:
    branches: ["main", "master", "dev"]

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install ruff
      - run: |
          ruff check .
          ruff format --check .

  test:
    runs-on: ubuntu-24.04
    needs: lint

    services:
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: business_management
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --no-root 

      - name: Create test database
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d business_management \
            -c "CREATE DATABASE test_business_db;"

      - name: Run tests
        env:
          DB_HOST: db
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: business_management
        run: |
          poetry run pytest --asyncio-mode=auto -v