name: CI Pipeline

on:
  push:
    branches: ["main", "master", "dev"]
  pull_request:
    branches: ["main", "master", "dev"]

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff Linter
        run: ruff check --output-format=github .

      - name: Run Ruff Formatter
        run: ruff format --check .

  test:
    runs-on: ubuntu-24.04
    needs: lint

    services:
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: erp_system_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --no-root

      - name: Create test database
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d erp_system_db \
            -c "CREATE DATABASE test_erp_system_db;"

      - name: Run tests
        env:
          DB_HOST: db
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: erp_system_db
          TEST_DB_NAME: test_erp_system_db
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          REDIS_HOST: redis
          REDIS_PORT: 6389
          KEY_OF_SYSTEM_TOKEN: ""
          RABBITMQ_USER: admin
          RABBITMQ_PASSWORD: admin
          RABBITMQ_HOST: rabbitmq
          RABBITMQ_PORT: 5672
        run: |
          poetry run pytest --asyncio-mode=auto -v
